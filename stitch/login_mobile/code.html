<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary-fixed": "#0b1c30",
                        "surface": "#f8f9ff",
                        "on-primary-container": "#582200",
                        "secondary-container": "#dae2fd",
                        "inverse-primary": "#ffb690",
                        "surface-bright": "#f8f9ff",
                        "on-tertiary-container": "#243348",
                        "on-surface": "#0b1c30",
                        "secondary": "#565e74",
                        "on-secondary": "#ffffff",
                        "outline-variant": "#e0c0b1",
                        "secondary-fixed": "#dae2fd",
                        "primary-fixed-dim": "#ffb690",
                        "surface-container-lowest": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#d3e4fe",
                        "error": "#ba1a1a",
                        "on-secondary-container": "#5c647a",
                        "primary-fixed": "#ffdbca",
                        "surface-container-low": "#eff4ff",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#8c9cb4",
                        "on-surface-variant": "#584237",
                        "surface-container": "#e5eeff",
                        "on-primary-fixed": "#341100",
                        "surface-container-high": "#dce9ff",
                        "on-primary-fixed-variant": "#783200",
                        "on-secondary-fixed-variant": "#3f465c",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed-variant": "#38485d",
                        "on-secondary-fixed": "#131b2e",
                        "tertiary-fixed-dim": "#b7c8e1",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#bec6e0",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-dim": "#cbdbf5",
                        "on-primary": "#ffffff",
                        "surface-variant": "#d3e4fe",
                        "tertiary-fixed": "#d3e4fe",
                        "background": "#f8f9ff",
                        "primary-container": "#f97316",
                        "tertiary": "#505f76",
                        "inverse-surface": "#213145",
                        "surface-tint": "#9d4300",
                        "on-background": "#0b1c30",
                        "primary": "#9d4300",
                        "outline": "#8c7164"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9ff;
        }
        .font-headline {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-between p-8">
<header class="w-full pt-12 flex flex-col items-center">
<div class="relative w-20 h-20 mb-6">
<div class="absolute inset-0 bg-primary-container/20 rounded-full blur-2xl"></div>
<div class="relative w-full h-full bg-gradient-to-br from-primary to-primary-container rounded-full flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-4xl" data-icon="wb_sunny">wb_sunny</span>
</div>
</div>
<h1 class="font-headline text-3xl font-bold tracking-tighter text-on-surface">Helios Chrono</h1>
<p class="font-label text-secondary text-xs uppercase tracking-widest mt-2">Precision Solar Tracking</p>
</header>
<main class="w-full max-w-sm flex-1 flex flex-col justify-center gap-12 py-12">
<section class="space-y-8">
<div class="space-y-6">
<div class="relative">
<label class="block font-label text-[10px] font-bold uppercase tracking-widest text-secondary mb-1 ml-1" for="email">Identity / Email</label>
<div class="group flex items-center bg-surface-container-low border-b-2 border-outline-variant/30 focus-within:border-primary transition-all px-4 h-14">
<span class="material-symbols-outlined text-secondary mr-3 text-lg" data-icon="alternate_email">alternate_email</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-secondary/40 font-body text-sm" id="email" placeholder="solar.observer@helios.com" type="email"/>
</div>
</div>
<div class="relative">
<label class="block font-label text-[10px] font-bold uppercase tracking-widest text-secondary mb-1 ml-1" for="password">Access Key / Password</label>
<div class="group flex items-center bg-surface-container-low border-b-2 border-outline-variant/30 focus-within:border-primary transition-all px-4 h-14">
<span class="material-symbols-outlined text-secondary mr-3 text-lg" data-icon="lock">lock</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-secondary/40 font-body text-sm" id="password" placeholder="••••••••" type="password"/>
</div>
<div class="flex justify-end mt-2">
<button class="text-[10px] font-bold uppercase tracking-widest text-secondary hover:text-primary transition-colors">Forgot Key?</button>
</div>
</div>
</div>
<div class="flex flex-col gap-4">
<button class="w-full h-14 bg-gradient-to-r from-primary to-primary-container text-white font-headline font-bold text-lg rounded-xl shadow-xl shadow-primary/15 hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2">
                    Sign In
                    <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="relative py-2 flex items-center justify-center">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/10"></div>
</div>
<span class="relative px-4 bg-surface text-[10px] font-bold uppercase tracking-widest text-secondary/40">Or continue as</span>
</div>
<button class="w-full h-14 bg-surface-container-highest text-on-surface font-headline font-semibold text-base rounded-xl hover:bg-surface-container-high active:scale-95 transition-all">
                    Sign In as Guest
                </button>
</div>
</section>
<section class="text-center">
<p class="font-body text-sm text-secondary">
                New to the observatory? 
                <a class="text-primary font-bold hover:underline" href="#">Create Account</a>
</p>
</section>
</main>
<footer class="w-full py-8 flex flex-col items-center gap-4">
<div class="flex gap-8">
<a class="font-label text-[10px] font-bold uppercase tracking-widest text-secondary/60 hover:text-primary transition-colors" href="#">Privacy</a>
<a class="font-label text-[10px] font-bold uppercase tracking-widest text-secondary/60 hover:text-primary transition-colors" href="#">Terms</a>
<a class="font-label text-[10px] font-bold uppercase tracking-widest text-secondary/60 hover:text-primary transition-colors" href="#">Support</a>
</div>
<div class="flex items-center gap-2 opacity-20">
<div class="h-[1px] w-8 bg-on-surface"></div>
<span class="material-symbols-outlined text-[10px]" data-icon="brightness_low">brightness_low</span>
<div class="h-[1px] w-8 bg-on-surface"></div>
</div>
</footer>
<div class="fixed top-0 left-0 w-full h-full pointer-events-none z-[-1] overflow-hidden">
<div class="absolute -top-[10%] -right-[10%] w-[60%] h-[40%] bg-primary-container/5 rounded-full blur-[100px]"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[50%] h-[30%] bg-surface-container-high/50 rounded-full blur-[80px]"></div>
</div>
</body></html>
