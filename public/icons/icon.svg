<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background circle -->
  <circle cx="96" cy="96" r="90" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>

  <!-- Sun circle with gradient effect -->
  <circle cx="96" cy="60" r="35" fill="#f59e0b"/>

  <!-- Sun rays -->
  <g stroke="#f59e0b" stroke-width="4" stroke-linecap="round">
    <!-- Top ray -->
    <line x1="96" y1="15" x2="96" y2="5"/>
    <!-- Right ray -->
    <line x1="141" y1="60" x2="151" y2="50"/>
    <!-- Bottom ray -->
    <line x1="96" y1="105" x2="96" y2="115"/>
    <!-- Left ray -->
    <line x1="51" y1="60" x2="41" y2="50"/>
    <!-- Top-right ray -->
    <line x1="130" y1="33" x2="137" y2="26"/>
    <!-- Bottom-right ray -->
    <line x1="137" y1="159" x2="130" y2="152"/>
    <!-- Bottom-left ray -->
    <line x1="56" y1="152" x2="49" y2="159"/>
    <!-- Top-left ray -->
    <line x1="49" y1="26" x2="56" y2="33"/>
  </g>

  <!-- Location pin indicator -->
  <circle cx="96" cy="140" r="8" fill="#f59e0b" opacity="0.7"/>
  <path d="M 96 128 L 92 140 L 96 148 L 100 140 Z" fill="#f59e0b"/>
</svg>
